name: Parity Sweep
on:
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:
    inputs:
      window:
        description: 'Time window (e.g. 7d, 30d, all)'
        required: false
        default: '7d'
        type: string

jobs:
  sweep:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Run parity sweep
        env:
          GITHUB_TOKEN: ${{ github.token }}
          WINDOW: ${{ inputs.window || '7d' }}
        run: bash scripts/parity-sweep.sh
